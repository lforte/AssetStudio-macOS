name: Release macOS App

# Builds AssetStudio.Maui and publishes it as a GitHub Release.
#
# Trigger a release by pushing a tag:
#   git tag -a v1.0.1 -m "v1.0.1"
#   git push origin v1.0.1
#
# Or run it manually from the Actions tab (workflow_dispatch) without creating a
# release - useful to sanity-check that the build still works.
#
# Known limitation: AssetStudioFBXNative needs the proprietary Autodesk FBX SDK,
# which can't be downloaded automatically here (requires a licensed Autodesk
# account). Released builds from this workflow therefore do NOT include FBX
# export - only Texture2DDecoderNative is built in CI. If you need FBX export,
# either build locally with the SDK installed (see README "Building"), or run
# this workflow on a self-hosted runner that already has the SDK at the path
# AssetStudioFBXNative/CMakeLists.txt expects, after adding a build step for it.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    # macos-latest currently maxes out at Xcode 26.3 (macOS SDK 26.2), which is too old for
    # this build (see the comment on the Xcode-selection step below). macos-26 is GitHub's
    # newer runner image and ships Xcode 26.5 with the macOS 26.4/26.5 SDKs we actually need.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The MacCatalyst linker step (ILLink/ManagedRegistrar) needs the MacCatalyst 26.4+ SDK -
      # building with an older one fails with MT4162/IL7000 errors about APIs "introduced in
      # MacCatalyst 26.4". `setup-xcode@v1`'s `xcode-version: latest-stable` picks whichever
      # Xcode that action considers the runner image's default "stable" version, which has
      # repeatedly lagged behind the newest Xcode actually installed on the same image (the
      # v1.1.0/v1.2.0 release builds both failed this way against a 26.2 SDK). Instead, inspect
      # every Xcode actually present on the runner and pick whichever has the highest MacCatalyst
      # SDK version, regardless of what label GitHub gives it.
      - name: Select Xcode with the highest available MacCatalyst SDK
        run: |
          # MacCatalyst apps build against the macOS SDK (there is no separate "maccatalyst"
          # SDK name in xcrun) - its version is what .NET's MT4162 errors mean by "MacCatalyst SDK".
          echo "Installed Xcode apps:"
          ls -d /Applications/Xcode*.app 2>&1 || echo "(none found)"

          best_app=""
          best_ver="0"
          for app in /Applications/Xcode*.app; do
            # Several of these are convenience symlinks to the same real Xcode install
            # (e.g. Xcode.app, Xcode_26.5.0.app -> Xcode_26.5.app) - resolve to the real,
            # canonical path so xcode-select/xcrun aren't pointed at a symlink, which has
            # caused actool/ibtool lookups to fail to resolve their tool paths correctly.
            [ -L "$app" ] && continue
            [ -d "$app" ] || continue
            ver=$(DEVELOPER_DIR="$app/Contents/Developer" xcrun --sdk macosx --show-sdk-version 2>/dev/null) || continue
            [ -z "$ver" ] && continue
            echo "Found $app -> macOS SDK $ver"
            if [ "$(printf '%s\n%s\n' "$ver" "$best_ver" | sort -V | tail -1)" = "$ver" ]; then
              best_ver="$ver"
              best_app="$app"
            fi
          done

          if [ -z "$best_app" ]; then
            echo "::error::No usable Xcode installation was found on this runner."
            exit 1
          fi

          echo "Selected $best_app (macOS SDK $best_ver)"
          required="26.4"
          if [ "$(printf '%s\n%s\n' "$best_ver" "$required" | sort -V | head -1)" = "$best_ver" ] && [ "$best_ver" != "$required" ]; then
            echo "::warning::Highest available macOS SDK is $best_ver, but the Release build needs $required+. This run will likely fail with MT4162/IL7000 errors - GitHub's macOS runner image hasn't caught up yet."
          fi

          echo "DEVELOPER_DIR=$best_app/Contents/Developer" >> "$GITHUB_ENV"
          sudo xcode-select -s "$best_app/Contents/Developer"
          xcodebuild -version
          # First-time setup for whichever Xcode we just switched to (harmless if already done) -
          # locally, skipping this after switching Xcode versions caused actool/ibtoold failures.
          sudo xcodebuild -runFirstLaunch

      - name: Install CMake
        run: brew install cmake

      - name: Build Texture2DDecoderNative (universal binary)
        run: |
          cmake -B Texture2DDecoderNative/build -S Texture2DDecoderNative \
                -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          cmake --build Texture2DDecoderNative/build --config Release

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build AssetStudio.Maui (Release)
        run: dotnet build AssetStudio.Maui/AssetStudio.Maui.csproj -c Release -f net10.0-maccatalyst

      - name: Package app bundle
        run: |
          APP_PATH=$(find AssetStudio.Maui/bin/Release/net10.0-maccatalyst -maxdepth 2 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find a built .app bundle" >&2
            exit 1
          fi
          ZIP_NAME="AssetStudio.Maui-${{ github.ref_name }}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssetStudio.Maui-macOS
          path: ${{ env.ZIP_NAME }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            **Note:** this CI build does not include FBX export or AudioClip playback preview -
            the Autodesk FBX SDK and the FMOD Engine are both proprietary and can't be fetched
            automatically in CI. Build locally with them installed (see the README's
            "Building"/"Requirements" sections) if you need either feature.

            The app is not code-signed with a Developer ID or notarized, so macOS
            Gatekeeper will block it on first launch: right-click the app -> **Open**,
            or run `xattr -cr AssetStudio.Maui.app` before launching.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
